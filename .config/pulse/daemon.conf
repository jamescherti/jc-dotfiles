# Requests a high CPU scheduling priority to minimize audio dropouts.
high-priority = yes

# Sets the standard CPU scheduling priority (-20 is highest, 19 is lowest).
nice-level = -15

# Attempts to acquire realtime CPU scheduling (requires rtkit/rtkit-daemon).
realtime-scheduling = yes

# The specific realtime scheduling priority requested (1 is lowest, 99 is
# highest).
realtime-priority = 9

# Sets the resource limit for realtime priority to match the requested level.
rlimit-rtprio = 9

# Keeps the process in the foreground. Required when running as a systemd
# service.
daemonize = no

# Uses 32-bit floating-point processing. Provides maximum mixing headroom to
# prevent digital clipping.
default-sample-format = float32le

# The algorithm used when audio must be resampled. 'speex-float-10' is maximum
# quality but very CPU intensive.
resample-method = speex-float-10

# Sets the default output to standard stereo (Left and Right).
default-sample-channels = 2

# The primary sample rate. 44100Hz (44.1kHz) is the standard for most music.
default-sample-rate = 44100

# The secondary sample rate. 48000Hz (48kHz) is standard for video and games.
# PulseAudio will switch to this automatically to avoid resampling overhead.
alternate-sample-rate = 48000
